<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 150 Ảnh - Highlight</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; max-width: 800px; margin: auto; }
  .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  h2 { color: #4caf50; text-align: center; margin-top: 0; }
  .input-group { margin: 20px 0; }
  input[type="file"] { background: #2d2d2d; padding: 12px; border-radius: 8px; width: 100%; color: #fff; cursor: pointer; border: 1px dashed #555; box-sizing: border-box; }
  
  button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
  #btnRun { background: #4caf50; color: white; font-size: 16px; padding: 15px; }
  #btnRun:hover { background: #45a049; }
  #btnRun:disabled { background: #3d3d3d; color: #777; cursor: not-allowed; }
  
  .btn-copy { background: #ff9800; color: #000; }
  #btnDownload { background: #2196F3; color: white; margin-top: 20px; }

  label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; }
  
  /* Thay thế cho textarea để có thể tô màu */
  .display-area { 
    width: 100%; height: 350px; background: #000; color: #fff; 
    border: 1px solid #333; padding: 15px; font-family: 'Courier New', monospace; 
    font-size: 18px; box-sizing: border-box; border-radius: 8px; line-height: 1.8; 
    overflow-y: auto; word-break: break-all; white-space: pre-wrap;
  }
  
  .hl-yellow { background-color: yellow; color: black; font-weight: bold; }
  .hl-blue { background-color: #00ccff; color: black; font-weight: bold; }

  .progress-container { margin: 20px 0; display: none; }
  .progress-bar { height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
  #progressFill { width: 0%; height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 0.3s; }
  #status { text-align: center; margin-top: 10px; font-weight: bold; color: #ffeb3b; }
</style>
</head>
<body>

<div class="card">
  <h2>Quét VN168 - Highlight</h2>
  
  <div class="input-group">
    <label>Chọn tối đa 150 ảnh:</label>
    <input type="file" id="upload" multiple accept="image/*">
  </div>
  
  <button id="btnRun" onclick="processImages()">BẮT ĐẦU XỬ LÝ</button>
  
  <div class="progress-container" id="progressCont">
    <div class="progress-bar"><div id="progressFill"></div></div>
    <div id="status">Sẵn sàng...</div>
  </div>

  <div style="margin-top: 20px;">
    <label>Kết quả dãy số (Vàng: >=5, Xanh: <5):</label>
    <div id="outputDisplay" class="display-area"></div>
    <button class="btn-copy" onclick="copyRawText()">SAO CHÉP DÃY SỐ</button>
  </div>
  
  <button id="btnDownload" onclick="downloadTxt()">TẢI FILE KẾT QUẢ (.TXT)</button>
</div>

<script>
let worker = null;
let rawFullText = ""; // Lưu trữ văn bản thuần để copy/download

async function initWorker() {
  if (!worker) {
    worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng');
    await worker.initialize('eng');
    await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
  }
}

function cropTarget(img) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const x = img.width * 0.40;
  const w = img.width * 0.20;
  const y = img.height * 0.35; 
  const h = img.height * 0.8;
  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(img, x, y, w, h, 0, 0, w, h);
  return canvas;
}

// Hàm quan trọng: Xử lý tô màu theo logic liên tiếp
function applyHighlighting(str) {
  if (!str) return "";
  let result = "";
  let i = 0;
  let chars = str.split('');

  while (i < chars.length) {
    let count = 1;
    let isBig = parseInt(chars[i]) >= 5;
    
    // Đếm số lượng liên tiếp cùng loại (lớn hơn/bằng 5 hoặc nhỏ hơn 5)
    while (i + count < chars.length && (parseInt(chars[i + count]) >= 5) === isBig) {
      count++;
    }

    let segment = chars.slice(i, i + count).join('');
    if (count >= 3) {
      let className = isBig ? "hl-yellow" : "hl-blue";
      result += `<span class="${className}">${segment}</span>`;
    } else {
      result += segment;
    }
    i += count;
  }
  return result;
}

async function processImages() {
  const files = document.getElementById("upload").files;
  if (files.length === 0) return alert("Chưa chọn ảnh bạn ơi!");

  const btnRun = document.getElementById("btnRun");
  const outputDisplay = document.getElementById("outputDisplay");
  const status = document.getElementById("status");
  const progressCont = document.getElementById("progressCont");
  const progressFill = document.getElementById("progressFill");

  btnRun.disabled = true;
  progressCont.style.display = "block";
  outputDisplay.innerHTML = "";
  rawFullText = "";
  
  await initWorker();

  for (let i = 0; i < files.length; i++) {
    const percent = Math.round(((i + 1) / files.length) * 100);
    status.innerText = `Đang quét ảnh ${i + 1}/${files.length}...`;
    progressFill.style.width = percent + "%";

    try {
      const img = await new Promise(res => {
        const r = new FileReader();
        r.onload = e => {
          const im = new Image();
          im.onload = () => res(im);
          im.src = e.target.result;
        };
        r.readAsDataURL(files[i]);
      });

      const cropped = cropTarget(img);
      const { data: { text } } = await worker.recognize(cropped);
      let nums = text.match(/\d/g);
      
      let row = nums ? nums.slice(0, 10).reverse().join('') : "0000000000";
      rawFullText += row;

      // Cập nhật hiển thị có màu
      outputDisplay.innerHTML = applyHighlighting(rawFullText);

    } catch (e) {
      console.error(e);
    }
  }

  status.innerText = "XONG! ĐÃ QUÉT TẤT CẢ.";
  btnRun.disabled = false;
}

function copyRawText() {
  if (!rawFullText) return;
  navigator.clipboard.writeText(rawFullText).then(() => {
    alert("Đã sao chép dãy số thuần!");
  });
}

function downloadTxt() {
  if (!rawFullText) return alert("Không có dữ liệu!");
  const suffix = Date.now().toString().slice(-4);
  const fileName = `168-HL-${suffix}.txt`; 
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([rawFullText], { type: 'text/plain' }));
  a.download = fileName;
  a.click();
}
</script>

</body>
</html>
